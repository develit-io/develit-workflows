name: deploy-sdk stable

# Reusable stable deploy (workflow_call) — provision → migrate → deploy → smoke pro push
# do stable vetvi. CI gate je consumer concern (job s ci-sdk + needs v jeho wrapperu):
#
#   on:
#     push:
#       branches: [dev, main]
#   concurrency:
#     group: stable-${{ github.ref_name }}
#     cancel-in-progress: ${{ github.ref_name == 'dev' }}
#   jobs:
#     ci:
#       uses: develit-io/develit-workflows/.github/workflows/ci.yaml@v1
#       secrets: inherit
#     deploy:
#       needs: ci
#       uses: develit-io/develit-workflows/.github/workflows/deploy-stable.yaml@v1
#       secrets: inherit   # same-org consumer; cross-org musi predat secrets explicitne (viz nize)
#       with:
#         env-passthrough: NUXT_ADMIN_MAIL,NUXT_NODEMAILER_AUTH_PASS
#
# Cross-org consumer (inherit GH nepodporuje mimo org — plati vzdy, i kdyz SDK je pod develit-io)
# preda secrets explicitne:
#       secrets:
#         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#         DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN }}  # GH Packages read (@develit-io/*)
#         # jen pokud pouziva env-passthrough — kompaktni 1-line JSON z konkretnich klicu;
#         # NE toJSON(secrets): viceradkovy secret rozbije redakci GH job outputs (skip output)
#         ENV_PASSTHROUGH_JSON: '{"NUXT_ADMIN_MAIL":"${{ secrets.NUXT_ADMIN_MAIL }}"}'
on:
  workflow_call:
    inputs:
      bun-version: { type: string, default: '1.3.12' }
      smoke-script: { type: string, default: scripts/smoke.sh }
      # CSV jmen GH secrets, ktere se exportuji do env pred provision/deploy —
      # topology.ts je cte pres process.env (vars workeru). Hodnoty se maskuji.
      env-passthrough: { type: string, default: '' }
      # Bez D1 (zadne migrace) → skip-migrate: true usetri job.
      skip-migrate: { type: boolean, default: false }
    # Same-org consumer pouziva `secrets: inherit`; cross-org (jiny org) predava vzdy explicitne
    # (GH inherit mimo org nefunguje — plati nezavisle na tom, ze SDK je pod develit-io).
    # Deklarace nevadi inherit consumerum (inherit required secrets splnuje).
    secrets:
      CLOUDFLARE_API_TOKEN: { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      CF_ACCESS_CLIENT_ID: { required: false }
      CF_ACCESS_CLIENT_SECRET: { required: false }
      # GH Packages read token pro @develit-io/* private install. Nepredano (same-org) -> fallback
      # na caller GITHUB_TOKEN; cross-org preda per-zakaznik token.
      DEVELIT_PACKAGES_TOKEN: { required: false }
      # Cross-org nahrada inherit pro env-passthrough: caller posle kompaktni 1-line
      # JSON z konkretnich klicu (viz header) — NE toJSON(secrets), rozbiji job outputs.
      ENV_PASSTHROUGH_JSON: { required: false }

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # GH Packages pull (@develit-io/*) — job perms jinak přebijí callerův grant → 403
    outputs:
      ids: ${{ steps.p.outputs.ids }}
      matrix: ${{ steps.p.outputs.matrix }}
      entrypoint: ${{ steps.p.outputs.entrypoint }}
      entrypointUrl: ${{ steps.p.outputs.entrypointUrl }}
      envKey: ${{ steps.p.outputs.envKey }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STABLE_ENV: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - name: Env passthrough (topology vars)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      - id: p
        run: bunx deploy-sdk provision

  # Explicitni pre-deploy migrace (serialne). Fail = deploy se vubec nespusti →
  # zadny half-migrated + half-deployed stav. Vyzaduje additive (expand/contract) migrace.
  migrate:
    needs: provision
    if: ${{ !inputs.skip-migrate }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STABLE_ENV: ${{ github.ref_name }}
      PREVIEW_IDS: ${{ needs.provision.outputs.ids }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - run: bunx deploy-sdk migrate

  deploy:
    needs: [provision, migrate]
    # skip-migrate → migrate je skipped; needs.migrate.result musime tolerovat
    if: ${{ !cancelled() && needs.provision.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJson(needs.provision.outputs.matrix) }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STABLE_ENV: ${{ github.ref_name }}
      PREVIEW_IDS: ${{ needs.provision.outputs.ids }}
      WORKER: ${{ matrix.worker }}
      SKIP_MIGRATIONS: '1' # migrace probehly v migrate jobu (nebo zadne nejsou)
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - name: Env passthrough (topology vars)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      - run: bunx deploy-sdk deploy
      - uses: actions/upload-artifact@v7
        with:
          name: url-${{ matrix.worker }}
          path: .preview/url-${{ matrix.worker }}.txt
          if-no-files-found: error

  smoke:
    needs: [provision, deploy]
    if: ${{ !cancelled() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: url-*
          path: urls
          merge-multiple: true
      - id: urls
        env:
          ENTRYPOINT: ${{ needs.provision.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ needs.provision.outputs.entrypointUrl }}
        run: |
          json='{}'
          for f in urls/url-*.txt; do
            base=$(basename "$f" .txt); base=${base#url-}
            json=$(printf '%s' "$json" | jq --arg b "$base" --arg u "$(cat "$f")" '. + {($b): $u}')
          done
          ep="$ENTRYPOINT_URL_DET"
          [ -z "$ep" ] && ep=$(cat "urls/url-${ENTRYPOINT}.txt")
          {
            echo "worker_urls=$(printf '%s' "$json" | jq -c .)"
            echo "entrypoint_url=$ep"
          } >> "$GITHUB_OUTPUT"
      - name: Smoke check (consumer-provided)
        env:
          ENTRYPOINT_URL: ${{ steps.urls.outputs.entrypoint_url }}
          WORKER_URLS: ${{ steps.urls.outputs.worker_urls }}
          # env KEY z provision (branch→env mapping resi topology, ne YAML)
          ENVIRONMENT_EXPECTED: ${{ needs.provision.outputs.envKey }}
          SMOKE_SCRIPT: ${{ inputs.smoke-script }}
          # Access (accessByEnv + serviceToken): smoke posila CF-Access-Client-Id/Secret headery.
          # Secrets volitelne — bez Accessu zustanou prazdne (no-op).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: bash "$SMOKE_SCRIPT"
