name: deploy-sdk staged

# Reusable stable deploy pres `deploy-sdk deploy-staged` (workflow_call) — JEDEN job:
# install → provision → migrate gate → staged deploy (SKIP_PROVISION, poradi auto-derived ze
# service grafu) → health-check → releaselog. Pro multi-worker topologie se service bindingy
# (dbu-txs); deploy-stable.yaml (matrix) zustava beze zmeny pro stavajici konzumenty.
# Kontrakt (inputs/secrets) je zamerne identicky s deploy-stable.yaml.
#
# Proc jeden job (mereno na dbu-txs, 13 workeru): 4-job varianta platila 4× checkout+setup+install
# (~1–1,5 min kazdy) + redundantni self-provision v deploy-staged (~2–3 min) + releaselog install
# jen kvuli vypnutemu gate → 15m46s. Single job = 1 install, provision ids se predaji krokum
# (PREVIEW_IDS + SKIP_PROVISION=1), releaselog krok je pri vypnutem gate ~zdarma.
# Migrate gate zustava: step fail = deploy krok se nespusti (zadny half-migrated + half-deployed).
#
# Consumer wrapper (cross-org preda secrets explicitne, viz deploy-stable.yaml header):
#   on:
#     push:
#       branches: [test-dev, dev, staging, production]
#   concurrency:
#     group: stable-${{ github.ref_name }}
#     cancel-in-progress: ${{ github.ref_name != 'production' }}
#   jobs:
#     deploy:
#       uses: develit-io/develit-workflows/.github/workflows/deploy-staged.yaml@v1
#       # actions: read jen s affected: true (nx-set-shas) — GH validuje perms při startu runu
#       permissions: { contents: write, packages: read, actions: read }
#       secrets: ...
#       with:
#         env-passthrough: NUXT_GATEWAY_SIGNATURE_KEY,SENTRY_AUTH_TOKEN
#         affected: true
on:
  workflow_call:
    inputs:
      bun-version: { type: string, default: '1.3.12' }
      smoke-script: { type: string, default: scripts/smoke.sh }
      # CSV jmen GH secrets, ktere se exportuji do env pred provision/deploy —
      # topology.ts je cte pres process.env (vars workeru). Hodnoty se maskuji.
      env-passthrough: { type: string, default: '' }
      # Bez D1 (zadne migrace) → skip-migrate: true preskoci migrate krok.
      skip-migrate: { type: boolean, default: false }
      # Affected-only deploy (nx monorepa): nx-set-shas najde SHA posledniho uspesneho runu na
      # teto vetvi → deploy jen zasazenych workeru (nx graf vc. dependentu). FAIL-OPEN: bez
      # baseline, pri nx chybe nebo zmene deploy kontraktu (topology/bun.lock/bunfig/package.json/
      # .github/workflows) se deployuje vsechno. Vyzaduje nx v repu konzumenta.
      affected: { type: boolean, default: false }
    # Same-org consumer pouziva `secrets: inherit`; cross-org (jiny org) predava vzdy explicitne
    # (GH inherit mimo org nefunguje — plati nezavisle na tom, ze SDK je pod develit-io).
    # Deklarace nevadi inherit consumerum (inherit required secrets splnuje).
    secrets:
      CLOUDFLARE_API_TOKEN: { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      CF_ACCESS_CLIENT_ID: { required: false }
      CF_ACCESS_CLIENT_SECRET: { required: false }
      # GH Packages read token pro @develit-io/* private install. Nepredano (same-org) -> fallback
      # na caller GITHUB_TOKEN; cross-org preda per-zakaznik token.
      DEVELIT_PACKAGES_TOKEN: { required: false }
      # Cross-org nahrada inherit pro env-passthrough: caller posle kompaktni 1-line
      # JSON z konkretnich klicu (viz deploy-stable.yaml header) — NE toJSON(secrets).
      ENV_PASSTHROUGH_JSON: { required: false }

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # releaselog (gh release) — gate-off konzumentum staci, GH perms validuje pri startu
      packages: read # GH Packages pull (@develit-io/*) — job perms jinak přebijí callerův grant → 403
      actions: read # nx-set-shas (affected) cte historii runu pres Actions API
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STABLE_ENV: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          # affected: git diff base..head potrebuje historii (shallow clone by base SHA nemel)
          fetch-depth: ${{ inputs.affected && '0' || '1' }}
      # Baseline pro affected: SHA posledniho USPESNEHO runu tohoto workflow na teto vetvi →
      # exportuje NX_BASE/NX_HEAD do env. Prvni run na vetvi baseline nema → fail-open (vsechno).
      - uses: nrwl/nx-set-shas@v4
        if: inputs.affected
        with:
          main-branch-name: ${{ github.ref_name }}
          error-on-no-successful-workflow: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - name: Env passthrough (topology vars)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      - id: p
        name: Provision
        run: bunx deploy-sdk provision
      # Explicitni pre-deploy migrace (serialne). Fail = deploy krok se nespusti →
      # zadny half-migrated + half-deployed stav. Vyzaduje additive (expand/contract) migrace.
      - name: Migrate
        if: ${{ !inputs.skip-migrate }}
        env:
          PREVIEW_IDS: ${{ steps.p.outputs.ids }}
        run: bunx deploy-sdk migrate
      # Staged deploy vsech workeru (paralelne v ramci stage, seriove mezi stages);
      # zapise .preview/url-<worker>.txt pro kazdy z nich.
      - name: Deploy (staged)
        env:
          PREVIEW_IDS: ${{ steps.p.outputs.ids }}
          SKIP_PROVISION: '1' # provision probehl krok vyse (ids v PREVIEW_IDS)
          SKIP_MIGRATIONS: '1' # migrace probehly v Migrate kroku (nebo zadne nejsou)
          AFFECTED: ${{ inputs.affected && '1' || '' }} # + NX_BASE/NX_HEAD z nx-set-shas
        run: bunx deploy-sdk deploy-staged
      - uses: actions/upload-artifact@v7
        with:
          name: url-all
          path: .preview/url-*.txt
          # `.preview/` je hidden dir — glob path bez tohohle flagu hidden soubory vynechá
          # (upload-artifact v4.4+ default).
          include-hidden-files: true
          # warn (ne error): affected deploy muze legitimne deploynout 0 workeru (docs-only push)
          if-no-files-found: warn
      # Centralizovany health-check: entrypoint vraci 2xx/3xx = deploy nasazeny.
      # 3xx = redirect na ZT Access login → worker zije + chraneny (bez service tokenu).
      # Retry budget 30×10 s = 5 min: fresh routa propaguje 1–90 s. Pozn.: 1. issuance
      # Total TLS certu noveho hostname ~10 min muze budget prezrat — re-run staci.
      - name: Health check
        env:
          ENTRYPOINT: ${{ steps.p.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ steps.p.outputs.entrypointUrl }}
          # Access (accessByEnv + serviceToken): posilame CF-Access-Client-Id/Secret headery.
          # Secrets volitelne — bez Accessu zustanou prazdne (no-op).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          ep="$ENTRYPOINT_URL_DET"
          [ -z "$ep" ] && [ -f ".preview/url-${ENTRYPOINT}.txt" ] && ep=$(cat ".preview/url-${ENTRYPOINT}.txt")
          if [ -z "$ep" ]; then
            echo "⚠ health-check skip — entrypoint nemá URL (workersDev:false bez custom domény)"
            exit 0
          fi
          URL="${ep%/}/"
          ACCESS_HDRS=()
          [ -n "${CF_ACCESS_CLIENT_ID:-}" ] && ACCESS_HDRS=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          CURL_TMO=(--connect-timeout 5 --max-time 10)
          RETRIES=${RETRIES:-30}
          SLEEP=${SLEEP:-10}
          for ((i = 1; i <= RETRIES; i++)); do
            code=$(curl -s "${CURL_TMO[@]}" ${ACCESS_HDRS[@]+"${ACCESS_HDRS[@]}"} -o /dev/null -w '%{http_code}' "$URL" 2>/dev/null) || code=000
            if [[ "$code" =~ ^[23] ]]; then
              echo "✓ health OK — ${URL} odpovídá (http=${code})"
              exit 0
            fi
            echo "… ještě nedostupné (cert/route propagace, http=${code}, pokus ${i}/${RETRIES}), čekám ${SLEEP}s — ${URL}"
            [ "$i" -lt "$RETRIES" ] && sleep "$SLEEP"
          done
          echo "✗ health FAIL — ${URL} nedostupné po ${RETRIES}×${SLEEP}s (cert nenaroloval / worker down)" >&2
          exit 1
      # Volitelne consumer testy (readiness uz resi Health check vyse).
      - name: Consumer tests (optional)
        env:
          ENTRYPOINT: ${{ steps.p.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ steps.p.outputs.entrypointUrl }}
          # env KEY z provision (branch→env mapping resi topology, ne YAML)
          ENVIRONMENT_EXPECTED: ${{ steps.p.outputs.envKey }}
          SMOKE_SCRIPT: ${{ inputs.smoke-script }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -f "$SMOKE_SCRIPT" ]; then
            json='{}'
            for f in .preview/url-*.txt; do
              base=$(basename "$f" .txt); base=${base#url-}
              json=$(printf '%s' "$json" | jq --arg b "$base" --arg u "$(cat "$f")" '. + {($b): $u}')
            done
            ep="$ENTRYPOINT_URL_DET"
            [ -z "$ep" ] && ep=$(cat ".preview/url-${ENTRYPOINT}.txt")
            WORKER_URLS="$json" ENTRYPOINT_URL="$ep" bash "$SMOKE_SCRIPT"
          else
            echo "no consumer test script ($SMOKE_SCRIPT) — skip"
          fi
      # Po stable deployi: GitHub Release s auto-gen notes (`bunx deploy-sdk releaselog`).
      # Gated topology.releaselog.enabledByEnv[env] → neopt-in repo = rychly no-op (sdilena
      # instalace, zadny extra job). continue-on-error → release fail neshodi deploy.
      - name: Releaselog
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx deploy-sdk releaselog
