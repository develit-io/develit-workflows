name: deploy-sdk preview

# Reusable PR preview (workflow_call) — obaluje `bunx deploy-sdk provision/deploy/cleanup`.
# Consumer dodá topology.ts + scripts/smoke.sh a tenký wrapper s pull_request triggerem:
#
#   on:
#     pull_request:
#       types: [opened, reopened, synchronize, closed]
#       branches: [dev]
#   concurrency:
#     group: preview-${{ github.event.number }}
#     cancel-in-progress: true
#   jobs:
#     preview:
#       uses: develit-io/develit-workflows/.github/workflows/deploy-preview.yaml@v1
#       secrets: inherit   # same-org consumer; cross-org musi predat secrets explicitne (viz nize)
#       with:
#         env-passthrough: NUXT_ADMIN_MAIL,NUXT_NODEMAILER_AUTH_PASS
#
# Cross-org consumer (inherit GH nepodporuje mimo org — plati vzdy, i kdyz SDK je pod develit-io)
# preda secrets explicitne:
#       secrets:
#         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#         DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN }}  # GH Packages read (@develit-io/*)
#         # jen pokud pouziva env-passthrough — kompaktni 1-line JSON z konkretnich klicu;
#         # NE toJSON(secrets): viceradkovy secret rozbije redakci GH job outputs (skip output)
#         ENV_PASSTHROUGH_JSON: '{"NUXT_ADMIN_MAIL":"${{ secrets.NUXT_ADMIN_MAIL }}"}'
on:
  workflow_call:
    inputs:
      bun-version: { type: string, default: latest }
      smoke-script: { type: string, default: scripts/smoke.sh }
      # CSV jmen GH secrets, ktere se exportuji do env pred provision/deploy —
      # topology.ts je cte pres process.env (vars workeru). Hodnoty se maskuji.
      env-passthrough: { type: string, default: '' }
    # Same-org consumer pouziva `secrets: inherit`; cross-org (jiny org) predava vzdy explicitne
    # (GH inherit mimo org nefunguje — plati nezavisle na tom, ze SDK je pod develit-io).
    # Deklarace nevadi inherit consumerum (inherit required secrets splnuje).
    secrets:
      CLOUDFLARE_API_TOKEN: { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      CF_ACCESS_CLIENT_ID: { required: false }
      CF_ACCESS_CLIENT_SECRET: { required: false }
      # GH Packages read token pro @develit-io/* private install. Nepredano (same-org) -> fallback
      # na caller GITHUB_TOKEN; cross-org preda per-zakaznik token.
      DEVELIT_PACKAGES_TOKEN: { required: false }
      # Cross-org nahrada inherit pro env-passthrough: caller posle kompaktni 1-line
      # JSON z konkretnich klicu (viz header) — NE toJSON(secrets), rozbiji job outputs.
      ENV_PASSTHROUGH_JSON: { required: false }

jobs:
  # Stage 1: sdilene zdroje JEDNOU + emit matice workeru + entrypoint pro smoke/comment.
  provision:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # sticky komentar
    outputs:
      ids: ${{ steps.p.outputs.ids }}
      matrix: ${{ steps.p.outputs.matrix }}
      entrypoint: ${{ steps.p.outputs.entrypoint }}
      entrypointUrl: ${{ steps.p.outputs.entrypointUrl }}
      seed: ${{ steps.p.outputs.seed }} # 'true' → explicitni migrate+seed pred deployem (viz seed job)
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### ⏳ Preview pro PR #${{ github.event.number }} se nasazuje…
            [Detail běhu](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
      - name: Env passthrough (topology vars)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      - id: p
        run: bunx deploy-sdk provision

  # Stage 1.5: JEN kdyz seed zapnuty (provision.outputs.seed == 'true'). Import dat potrebuje schema →
  # explicitni migrate+seed pred deployem; deploy pak preskoci inline migrace (SKIP_MIGRATIONS=1, jak stable).
  # Seed vypnuty → job se preskoci a deploy migruje inline jako doposud (zpetne kompatibilni).
  seed:
    needs: provision
    if: github.event.action != 'closed' && needs.provision.outputs.seed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.number }}
      PREVIEW_IDS: ${{ needs.provision.outputs.ids }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - name: Env passthrough (topology vars pro migrate)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      - run: bunx deploy-sdk migrate
      - run: bunx deploy-sdk seed

  # Stage 2: kazdy worker paralelne. fail-fast:false → jeden pad nezabije ostatni, smoke to nahlasi.
  deploy:
    needs: [provision, seed]
    # always() → poustej i kdyz seed job skipnuty (seed vypnuty). Blokuj jen kdyz provision/seed selhal
    # (spatna migrace/seed nesmi deployovat). skipped seed = OK → inline migrace jako doposud.
    if: ${{ always() && github.event.action != 'closed' && needs.provision.result == 'success' && needs.seed.result != 'failure' && needs.seed.result != 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJson(needs.provision.outputs.matrix) }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.number }}
      PREVIEW_IDS: ${{ needs.provision.outputs.ids }}
      WORKER: ${{ matrix.worker }}
      # seed zapnuty → seed job uz odmigroval; deploy preskoci inline migrace (jako stable pipeline).
      SKIP_MIGRATIONS: ${{ needs.provision.outputs.seed == 'true' && '1' || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - name: Env passthrough (topology vars)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      - run: bunx deploy-sdk deploy
      - uses: actions/upload-artifact@v7
        with:
          name: url-${{ matrix.worker }}
          path: .preview/url-${{ matrix.worker }}.txt
          if-no-files-found: error

  # Stage 3: resolve URL → consumer smoke → finalni komentar.
  smoke:
    needs: [provision, deploy]
    # !cancelled() + deploy.result==success: smoke (a finální preview comment) běží i když seed skipnut.
    # Jinak always() na deploy propaguje skip ze seed → smoke skipped → comment zůstane na "se nasazuje…".
    if: ${{ !cancelled() && needs.deploy.result == 'success' && github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # explicitni perms blok zahodi default → checkout potrebuje contents:read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: url-*
          path: urls
          merge-multiple: true
      # Postav WORKER_URLS (JSON {base:url}) + markdown tabulku + resolve ENTRYPOINT_URL.
      - id: urls
        env:
          ENTRYPOINT: ${{ needs.provision.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ needs.provision.outputs.entrypointUrl }} # neprazdne = custom domena
        run: |
          json='{}'
          table=''
          for f in urls/url-*.txt; do
            base=$(basename "$f" .txt); base=${base#url-}
            u=$(cat "$f")
            json=$(printf '%s' "$json" | jq --arg b "$base" --arg u "$u" '. + {($b): $u}')
            table="${table}| ${base} | ${u} |"$'\n'
          done
          ep="$ENTRYPOINT_URL_DET"
          [ -z "$ep" ] && ep=$(cat "urls/url-${ENTRYPOINT}.txt")
          {
            echo "worker_urls=$(printf '%s' "$json" | jq -c .)"
            echo "entrypoint_url=$ep"
            echo "table<<TABLE_EOF"; printf '%s' "$table"; echo "TABLE_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Smoke check (consumer-provided)
        env:
          ENTRYPOINT_URL: ${{ steps.urls.outputs.entrypoint_url }}
          WORKER_URLS: ${{ steps.urls.outputs.worker_urls }}
          ENVIRONMENT_EXPECTED: preview
          SMOKE_SCRIPT: ${{ inputs.smoke-script }}
          # Access (accessByEnv + serviceToken): smoke posila CF-Access-Client-Id/Secret headery.
          # Secrets volitelne — bez Accessu zustanou prazdne (no-op).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: bash "$SMOKE_SCRIPT"

      - if: success()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### 🚀 Preview pro PR #${{ github.event.number }}

            Entrypoint: ${{ steps.urls.outputs.entrypoint_url }}

            | Worker | URL |
            |---|---|
            ${{ steps.urls.outputs.table }}

            Resources `${{ github.event.number }}-*` se smažou po zavření PR.

      - if: failure()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### ❌ Preview pro PR #${{ github.event.number }} selhal
            Deploy nebo smoke check neprošel. [Detail běhu](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - run: bunx deploy-sdk cleanup
      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### 🧹 Preview pro PR #${{ github.event.number }} smazán
            Všechny `${{ github.event.number }}-*` workery + resources odstraněny.
