name: deploy-sdk preview

# Reusable PR preview (workflow_call) — JEDEN job: sticky comment hned → install → provision →
# seed-gated migrate+seed → staged deploy (SKIP_PROVISION, poradi auto-derived ze service grafu)
# → health-check → finalni komentar. Cleanup zavreneho PR zustava samostatny job.
#
# Proc jeden job (vzor deploy-staged.yaml): multi-job varianta platila 3-4× checkout+setup+install
# (~1-1,5 min kazdy) + artifact roundtrip pro URL. Single job = 1 install, provision ids se predaji
# krokum (PREVIEW_IDS + SKIP_PROVISION=1). Seed gate zustava: migrate/seed step fail = deploy krok
# se nespusti. Releaselog tu zamerne neni (stable-only, hard-fail bez STABLE_ENV).
#
# Consumer dodá topology.ts a tenký wrapper s pull_request triggerem (health-check je centralni;
# volitelne consumer testy pres smoke-script input, run-if-exists):
#
#   on:
#     pull_request:
#       types: [opened, reopened, synchronize, closed]
#       branches: [dev]
#   concurrency:
#     group: preview-${{ github.event.number }}
#     cancel-in-progress: true
#   jobs:
#     preview:
#       uses: develit-io/develit-workflows/.github/workflows/deploy-preview.yaml@v1
#       secrets: inherit   # same-org consumer; cross-org musi predat secrets explicitne (viz nize)
#       with:
#         env-passthrough: NUXT_ADMIN_MAIL,NUXT_NODEMAILER_AUTH_PASS
#
# Cross-org consumer (inherit GH nepodporuje mimo org — plati vzdy, i kdyz SDK je pod develit-io)
# preda secrets explicitne:
#       secrets:
#         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#         DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN }}  # GH Packages read (@develit-io/*)
#         # jen pokud pouziva env-passthrough — kompaktni 1-line JSON z konkretnich klicu;
#         # NE toJSON(secrets): viceradkovy secret rozbije redakci GH job outputs (skip output)
#         ENV_PASSTHROUGH_JSON: '{"NUXT_ADMIN_MAIL":"${{ secrets.NUXT_ADMIN_MAIL }}"}'
on:
  workflow_call:
    inputs:
      bun-version: { type: string, default: '1.3.12' }
      smoke-script: { type: string, default: scripts/smoke.sh }
      # CSV jmen GH secrets, ktere se exportuji do env pred provision/deploy —
      # topology.ts je cte pres process.env (vars workeru). Hodnoty se maskuji.
      env-passthrough: { type: string, default: '' }
    # Same-org consumer pouziva `secrets: inherit`; cross-org (jiny org) predava vzdy explicitne
    # (GH inherit mimo org nefunguje — plati nezavisle na tom, ze SDK je pod develit-io).
    # Deklarace nevadi inherit consumerum (inherit required secrets splnuje).
    secrets:
      CLOUDFLARE_API_TOKEN: { required: true }
      CLOUDFLARE_ACCOUNT_ID: { required: true }
      CF_ACCESS_CLIENT_ID: { required: false }
      CF_ACCESS_CLIENT_SECRET: { required: false }
      # GH Packages read token pro @develit-io/* private install. Nepredano (same-org) -> fallback
      # na caller GITHUB_TOKEN; cross-org preda per-zakaznik token.
      DEVELIT_PACKAGES_TOKEN: { required: false }
      # Cross-org nahrada inherit pro env-passthrough: caller posle kompaktni 1-line
      # JSON z konkretnich klicu (viz header) — NE toJSON(secrets), rozbiji job outputs.
      ENV_PASSTHROUGH_JSON: { required: false }

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    # provision (EU D1, cert) + deploy + health-check — strop proti stuck runu (GH default 6 h)
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write # sticky komentar
      packages: read # GH Packages pull (@develit-io/*) — job perms jinak přebijí callerův grant → 403
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # STABLE_ENV se tu NIKDY nesetuje — resolveDeployEnv ho cte prednostne pred PR_NUMBER.
      PR_NUMBER: ${{ github.event.number }}
    steps:
      # Prvni krok, jeste pred checkoutem (cista API akce) — feedback v PR za par sekund.
      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### ⏳ Preview pro PR #${{ github.event.number }} se nasazuje…
            [Detail běhu](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - name: Env passthrough (topology vars)
        if: inputs.env-passthrough != ''
        env:
          SECRETS_JSON: ${{ secrets.ENV_PASSTHROUGH_JSON || toJSON(secrets) }}
          KEYS: ${{ inputs.env-passthrough }}
        run: |
          for k in ${KEYS//,/ }; do
            v=$(printf '%s' "$SECRETS_JSON" | jq -r --arg k "$k" '.[$k] // empty')
            if [ -n "$v" ]; then
              echo "::add-mask::$v"
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$k" "$v" >> "$GITHUB_ENV"
            fi
          done
      # Cert pre-warm nad novejsim SDK nez ma konzument v locku — rollout bez consumer bumpu;
      # na 0.26+ konzumentech redundantni (provision to dela sam, idempotentni attach = no-op).
      # Advisory: nesmi shodit deploy → || warning. Bezi PRED provisionem (cert se pece i behem nej).
      # Temp projekt s vlastnim bunfig scope — bunx globalni config je na Linux runnerech
      # nespolehlivy (npmjs 404), stejny trap a pattern jako deps-update.yaml Install dvl CLI.
      - name: Cert pre-warm
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
        run: |
          {
            mkdir -p /tmp/prewarm-sdk && cd /tmp/prewarm-sdk
            printf '{"dependencies":{"@develit-io/deploy-sdk":"0.26.0"}}' > package.json
            printf '[install.scopes]\n"@develit-io" = { url = "https://npm.pkg.github.com/", token = "$DEVELIT_PACKAGES_TOKEN" }\n' > bunfig.toml
            bun install --ignore-scripts
            cd "$GITHUB_WORKSPACE"
            /tmp/prewarm-sdk/node_modules/.bin/deploy-sdk prewarm
          } || echo "::warning::cert pre-warm preskocen (deploy pokracuje)"
      - id: p
        name: Provision
        run: bunx deploy-sdk provision
      # Seed zapnuty (provision.seed) → import dat potrebuje schema: explicitni migrate+seed pred
      # deployem; deploy pak preskoci inline migrace. Seed vypnuty → oba kroky skip a deploy migruje
      # inline jako doposud (zpetne kompatibilni). Step fail = deploy krok se nespusti (implicitni
      # success() gate — zadny half-migrated + half-deployed stav).
      - name: Migrate
        if: steps.p.outputs.seed == 'true'
        env:
          PREVIEW_IDS: ${{ steps.p.outputs.ids }}
        run: bunx deploy-sdk migrate
      - name: Seed
        if: steps.p.outputs.seed == 'true'
        env:
          PREVIEW_IDS: ${{ steps.p.outputs.ids }}
        run: bunx deploy-sdk seed
      # Staged deploy vsech workeru (paralelne v ramci stage, seriove mezi stages) — preview
      # potrebuje kompletni per-PR env, zadny AFFECTED. Zapise .preview/url-<worker>.txt.
      - name: Deploy (staged)
        env:
          PREVIEW_IDS: ${{ steps.p.outputs.ids }}
          SKIP_PROVISION: '1' # provision probehl krok vyse (ids v PREVIEW_IDS)
          # seed zapnuty → migrace probehly v Migrate kroku; jinak inline migrace (jako doposud)
          SKIP_MIGRATIONS: ${{ steps.p.outputs.seed == 'true' && '1' || '' }}
        run: bunx deploy-sdk deploy-staged
      - uses: actions/upload-artifact@v7
        with:
          name: url-all
          path: .preview/url-*.txt
          # `.preview/` je hidden dir — glob path bez tohohle flagu hidden soubory vynechá
          # (upload-artifact v4.4+ default).
          include-hidden-files: true
          # error (ne warn jako u staged): preview nema affected → 0 url souboru = bug
          if-no-files-found: error
      # Centralizovany health-check: entrypoint vraci 2xx/3xx = deploy nasazeny.
      # 3xx = redirect na ZT Access login → worker zije + chraneny (bez service tokenu).
      # Retry budget 30×10 s = 5 min: fresh workers.dev routa propaguje 1–90 s. Pozn.: 1. issuance
      # Total TLS certu noveho hostname ~10 min muze budget prezrat — jednorazova vec, re-run staci.
      - name: Health check
        env:
          ENTRYPOINT: ${{ steps.p.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ steps.p.outputs.entrypointUrl }}
          # Access (accessByEnv + serviceToken): posilame CF-Access-Client-Id/Secret headery.
          # Secrets volitelne — bez Accessu zustanou prazdne (no-op).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          ep="$ENTRYPOINT_URL_DET"
          [ -z "$ep" ] && [ -f ".preview/url-${ENTRYPOINT}.txt" ] && ep=$(cat ".preview/url-${ENTRYPOINT}.txt")
          if [ -z "$ep" ]; then
            echo "⚠ health-check skip — entrypoint nemá URL (workersDev:false bez custom domény)"
            exit 0
          fi
          URL="${ep%/}/"
          ACCESS_HDRS=()
          [ -n "${CF_ACCESS_CLIENT_ID:-}" ] && ACCESS_HDRS=(-H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}")
          CURL_TMO=(--connect-timeout 5 --max-time 10)
          RETRIES=${RETRIES:-30}
          SLEEP=${SLEEP:-10}
          for ((i = 1; i <= RETRIES; i++)); do
            code=$(curl -s "${CURL_TMO[@]}" ${ACCESS_HDRS[@]+"${ACCESS_HDRS[@]}"} -o /dev/null -w '%{http_code}' "$URL" 2>/dev/null) || code=000
            if [[ "$code" =~ ^[23] ]]; then
              echo "✓ health OK — ${URL} odpovídá (http=${code})"
              exit 0
            fi
            echo "… ještě nedostupné (cert/route propagace, http=${code}, pokus ${i}/${RETRIES}), čekám ${SLEEP}s — ${URL}"
            [ "$i" -lt "$RETRIES" ] && sleep "$SLEEP"
          done
          echo "✗ health FAIL — ${URL} nedostupné po ${RETRIES}×${SLEEP}s (cert nenaroloval / worker down)" >&2
          exit 1
      # Volitelne consumer testy (readiness uz resi Health check vyse).
      - name: Consumer tests (optional)
        env:
          ENTRYPOINT: ${{ steps.p.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ steps.p.outputs.entrypointUrl }}
          # envKey z provision = 'preview' (branch→env mapping resi topology, ne YAML)
          ENVIRONMENT_EXPECTED: ${{ steps.p.outputs.envKey }}
          SMOKE_SCRIPT: ${{ inputs.smoke-script }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -f "$SMOKE_SCRIPT" ]; then
            json='{}'
            for f in .preview/url-*.txt; do
              base=$(basename "$f" .txt); base=${base#url-}
              json=$(printf '%s' "$json" | jq --arg b "$base" --arg u "$(cat "$f")" '. + {($b): $u}')
            done
            ep="$ENTRYPOINT_URL_DET"
            [ -z "$ep" ] && ep=$(cat ".preview/url-${ENTRYPOINT}.txt")
            WORKER_URLS="$json" ENTRYPOINT_URL="$ep" bash "$SMOKE_SCRIPT"
          else
            echo "no consumer test script ($SMOKE_SCRIPT) — skip"
          fi
      # URL tabulka + entrypoint pro finalni komentar — primo z .preview/, zadny artifact roundtrip.
      - id: urls
        env:
          ENTRYPOINT: ${{ steps.p.outputs.entrypoint }}
          ENTRYPOINT_URL_DET: ${{ steps.p.outputs.entrypointUrl }}
        run: |
          table=''
          for f in .preview/url-*.txt; do
            base=$(basename "$f" .txt); base=${base#url-}
            table="${table}| ${base} | $(cat "$f") |"$'\n'
          done
          ep="$ENTRYPOINT_URL_DET"
          [ -z "$ep" ] && [ -f ".preview/url-${ENTRYPOINT}.txt" ] && ep=$(cat ".preview/url-${ENTRYPOINT}.txt")
          {
            echo "entrypoint_url=$ep"
            echo "table<<TABLE_EOF"; printf '%s' "$table"; echo "TABLE_EOF"
          } >> "$GITHUB_OUTPUT"
      - if: success()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### 🚀 Preview pro PR #${{ github.event.number }}

            Entrypoint: ${{ steps.urls.outputs.entrypoint_url }}

            | Worker | URL |
            |---|---|
            ${{ steps.urls.outputs.table }}

            Resources `${{ github.event.number }}-*` se smažou po zavření PR.

      # failure() v single jobu pokryva VSECHNY predchozi kroky (install/provision/migrate/seed/
      # deploy/health/testy) — komentar uz nezustane viset na „se nasazuje…" jako u multi-job varianty.
      - if: failure()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### ❌ Preview pro PR #${{ github.event.number }} selhal
            Provision, migrace/seed, deploy nebo health check neprošel. [Detail běhu](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    # teardown per-PR zdrojů — strop proti stuck runu
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      packages: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          DEVELIT_PACKAGES_TOKEN: ${{ secrets.DEVELIT_PACKAGES_TOKEN || github.token }}
      - run: bunx deploy-sdk cleanup
      - uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: preview
          message: |
            ### 🧹 Preview pro PR #${{ github.event.number }} smazán
            Všechny `${{ github.event.number }}-*` workery + resources odstraněny.
